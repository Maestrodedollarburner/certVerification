<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employer Dashboard - CertiChain</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-dark navbar-app sticky-top">
    <div class="container-fluid px-3 px-md-4">
      <a class="navbar-brand" href="/"><i class="bi bi-shield-check"></i> CertiChain</a>
      <div class="d-flex align-items-center gap-3 ms-auto">
        <span class="navbar-user d-none d-sm-inline" id="userName"></span>
        <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
      </div>
    </div>
  </nav>

  <div class="container py-4 dashboard-content">
    <div class="page-header">
      <h2><i class="bi bi-building-check"></i> Employer Verification Portal</h2>
      <p class="text-muted mb-0">Verify academic certificates and review your verification history</p>
    </div>

    <div class="row g-4">
      <div class="col-lg-5">
        <div class="card card-interactive p-4">
          <h5>Verify Certificate</h5>
          <form id="verifyForm" class="mt-3">
            <div class="mb-3">
              <label class="form-label">Certificate ID</label>
              <input type="text" class="form-control" id="certificateId" placeholder="CERT-..." required>
            </div>
            <button type="submit" class="btn btn-primary w-100" id="verifyBtn">
              <i class="bi bi-patch-check"></i> Verify Now
            </button>
          </form>
          <a href="/verify.html" class="btn btn-outline-primary w-100 mt-2">
            <i class="bi bi-qr-code-scan"></i> Open Full Verification Page
          </a>
        </div>
        <div id="result" class="card p-4 mt-4 d-none"></div>
      </div>
      <div class="col-lg-7">
        <div class="card card-interactive p-4">
          <h5>Your Verification History</h5>
          <div class="table-responsive mt-3">
            <table class="table table-hover table-sm">
              <thead>
                <tr><th>Certificate ID</th><th>Result</th><th>Method</th><th>Date</th></tr>
              </thead>
              <tbody id="historyTable">
                <tr><td colspan="4" class="text-muted">Loading...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script>
    const user = requireAuth(['employer']);
    if (!user) throw new Error('Unauthorized');
    document.getElementById('userName').textContent = user.name;

    async function loadHistory() {
      const data = await api.getVerificationHistory();
      const table = document.getElementById('historyTable');
      if (!data.logs.length) {
        table.innerHTML = '<tr><td colspan="4" class="text-muted">No verifications yet</td></tr>';
        return;
      }
      table.innerHTML = data.logs.map(l => `
        <tr>
          <td><code>${l.certificateId}</code></td>
          <td>${statusBadge(l.result)}</td>
          <td>${l.method}</td>
          <td>${new Date(l.createdAt).toLocaleString()}</td>
        </tr>
      `).join('');
    }

    document.getElementById('verifyForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('certificateId').value.trim();
      const btn = document.getElementById('verifyBtn');
      const resultDiv = document.getElementById('result');
      btn.disabled = true;

      try {
        const data = await api.verifyCertificate(id);
        const v = data.verification;
        resultDiv.classList.remove('d-none');
        resultDiv.innerHTML = `
          <h5 class="text-${v.status === 'Valid' ? 'success' : 'danger'}">${v.status}</h5>
          <p class="mb-2">${v.message}</p>
          ${v.studentName ? `<p class="mb-0 small"><strong>${v.studentName}</strong> — ${v.degreeAwarded || ''}<br>${v.institutionName || ''}</p>` : ''}`;
        loadHistory();
      } catch (err) {
        resultDiv.classList.remove('d-none');
        resultDiv.innerHTML = `<div class="alert alert-danger mb-0">${err.message}</div>`;
      }

      btn.disabled = false;
    });

    loadHistory();
  </script>
</body>
</html>
