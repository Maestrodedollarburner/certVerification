<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auditor Dashboard - CertiChain</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-dark navbar-app sticky-top">
    <div class="container-fluid px-3 px-md-4">
      <a class="navbar-brand" href="/"><i class="bi bi-shield-check"></i> CertiChain</a>
      <div class="d-flex align-items-center gap-3 ms-auto">
        <span class="readonly-badge"><i class="bi bi-eye"></i> Read Only</span>
        <span class="navbar-user d-none d-sm-inline" id="userName"></span>
        <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
      </div>
    </div>
  </nav>

  <div class="container py-4 dashboard-content">
    <div class="page-header d-flex justify-content-between align-items-center flex-wrap gap-2">
      <div>
        <h2><i class="bi bi-clipboard-data"></i> Auditor Dashboard</h2>
        <p class="text-muted mb-0">Read-only compliance and audit view</p>
      </div>
      <span class="blockchain-badge" id="blockchainStatus">Checking...</span>
    </div>

    <div class="row g-4 mb-4 stagger-group">
      <div class="col-6 col-lg-3 stagger-item"><div class="card stat-card p-3"><div class="stat-value" id="totalUsers">-</div><div class="stat-label">Users</div></div></div>
      <div class="col-6 col-lg-3 stagger-item"><div class="card stat-card p-3"><div class="stat-value" id="totalCerts">-</div><div class="stat-label">Certificates</div></div></div>
      <div class="col-6 col-lg-3 stagger-item"><div class="card stat-card p-3"><div class="stat-value" id="totalVerifications">-</div><div class="stat-label">Verifications</div></div></div>
      <div class="col-6 col-lg-3 stagger-item"><div class="card stat-card p-3"><div class="stat-value" id="totalInstitutions">-</div><div class="stat-label">Institutions</div></div></div>
    </div>

    <ul class="nav nav-tabs mb-4" role="tablist">
      <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tabCerts">Certificates</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabVerifications">Verifications</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabUsers">Users</button></li>
    </ul>

    <div class="tab-content">
      <div class="tab-pane fade show active" id="tabCerts">
        <div class="card p-4">
          <div class="d-flex gap-2 mb-3 flex-wrap">
            <input type="text" class="form-control form-control-sm" style="max-width:240px" id="certSearch" placeholder="Search certificates...">
            <select class="form-select form-select-sm w-auto" id="certStatusFilter">
              <option value="">All Statuses</option>
              <option value="Valid">Valid</option>
              <option value="Revoked">Revoked</option>
              <option value="Pending">Pending</option>
            </select>
          </div>
          <div class="table-responsive">
            <table class="table table-hover table-sm">
              <thead><tr><th>Certificate ID</th><th>Student</th><th>Institution</th><th>Degree</th><th>Status</th><th>On Chain</th><th>Issued</th></tr></thead>
              <tbody id="certsTable"></tbody>
            </table>
          </div>
        </div>
      </div>
      <div class="tab-pane fade" id="tabVerifications">
        <div class="card p-4">
          <div class="table-responsive">
            <table class="table table-hover table-sm">
              <thead><tr><th>Certificate ID</th><th>Result</th><th>Method</th><th>Verifier</th><th>Date</th></tr></thead>
              <tbody id="verificationsTable"></tbody>
            </table>
          </div>
        </div>
      </div>
      <div class="tab-pane fade" id="tabUsers">
        <div class="card p-4">
          <select class="form-select form-select-sm w-auto mb-3" id="userRoleFilter">
            <option value="">All Roles</option>
            <option value="institution">Institution</option>
            <option value="student">Student</option>
            <option value="employer">Employer</option>
            <option value="auditor">Auditor</option>
          </select>
          <div class="table-responsive">
            <table class="table table-hover table-sm">
              <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Joined</th></tr></thead>
              <tbody id="usersTable"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script>
    const user = requireAuth(['auditor']);
    if (!user) throw new Error('Unauthorized');
    document.getElementById('userName').textContent = user.name;

    async function loadOverview() {
      const [overview, chain] = await Promise.all([api.getAuditorOverview(), api.getBlockchainStatus()]);
      const s = overview.stats;
      document.getElementById('totalUsers').textContent = s.totalUsers;
      document.getElementById('totalCerts').textContent = s.totalCertificates;
      document.getElementById('totalVerifications').textContent = s.totalVerifications;
      document.getElementById('totalInstitutions').textContent = s.totalInstitutions;
      document.getElementById('blockchainStatus').innerHTML = chain.ready
        ? '<i class="bi bi-circle-fill text-success"></i> Blockchain Connected'
        : '<i class="bi bi-circle-fill text-warning"></i> Offline';
    }

    async function loadCertificates() {
      const search = document.getElementById('certSearch').value;
      const status = document.getElementById('certStatusFilter').value;
      let params = '?';
      if (search) params += `search=${encodeURIComponent(search)}&`;
      if (status) params += `status=${status}`;
      const data = await api.getAuditorCertificates(params === '?' ? '' : params);
      document.getElementById('certsTable').innerHTML = data.certificates.map(c => `
        <tr>
          <td><small>${c.certificateId}</small></td>
          <td>${c.studentName}</td>
          <td>${c.institutionName}</td>
          <td>${c.degreeAwarded}</td>
          <td>${statusBadge(c.status)}</td>
          <td>${c.onChain ? '<i class="bi bi-check-circle text-success"></i>' : '<i class="bi bi-dash-circle text-muted"></i>'}</td>
          <td><small>${formatDate(c.issueDate)}</small></td>
        </tr>`).join('') || '<tr><td colspan="7" class="text-muted">No certificates found</td></tr>';
    }

    async function loadVerifications() {
      const data = await api.getAuditorVerifications();
      document.getElementById('verificationsTable').innerHTML = data.verifications.map(v => `
        <tr>
          <td><small>${v.certificateId}</small></td>
          <td>${statusBadge(v.result)}</td>
          <td>${v.method || 'id'}</td>
          <td>${v.verifiedBy ? v.verifiedBy.name : '<em>Anonymous</em>'}</td>
          <td><small>${formatDate(v.createdAt)}</small></td>
        </tr>`).join('') || '<tr><td colspan="5" class="text-muted">No verifications</td></tr>';
    }

    async function loadUsers() {
      const role = document.getElementById('userRoleFilter').value;
      const data = await api.getAuditorUsers(role ? `?role=${role}` : '');
      document.getElementById('usersTable').innerHTML = data.users.map(u => `
        <tr>
          <td>${u.name}</td>
          <td>${u.email}</td>
          <td><span class="badge bg-secondary">${u.role}</span></td>
          <td>${u.isActive ? '<span class="badge bg-success">Active</span>' : '<span class="badge bg-danger">Inactive</span>'}</td>
          <td><small>${formatDate(u.createdAt)}</small></td>
        </tr>`).join('');
    }

    document.getElementById('certSearch').addEventListener('input', loadCertificates);
    document.getElementById('certStatusFilter').addEventListener('change', loadCertificates);
    document.getElementById('userRoleFilter').addEventListener('change', loadUsers);

    loadOverview();
    loadCertificates();
    loadVerifications();
    loadUsers();
  </script>
</body>
</html>
