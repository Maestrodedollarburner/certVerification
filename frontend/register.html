<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - CertiChain</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-dark navbar-app">
    <div class="container">
      <a class="navbar-brand" href="/"><i class="bi bi-shield-check"></i> Certi<span>Chain</span></a>
    </div>
  </nav>

  <div class="auth-page">
  <div class="container">
    <div class="card auth-card p-4">
      <div class="text-center mb-4">
        <h2>Create Account</h2>
        <p class="text-muted">Join the blockchain certificate platform</p>
      </div>
      <div id="alert"></div>
      <form id="registerForm">
        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-control" id="name" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-control" id="email" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" id="password" required minlength="6">
        </div>
        <div class="mb-3">
          <label class="form-label">Register As</label>
          <select class="form-select" id="role" required>
            <option value="">Select role...</option>
            <option value="institution">Institution / Registrar</option>
            <option value="student">Student</option>
            <option value="employer">Employer / Verifier</option>
          </select>
        </div>
        <div class="mb-3 d-none" id="institutionField">
          <label class="form-label">Institution Name</label>
          <input type="text" class="form-control" id="institutionName" placeholder="University of Example">
        </div>
        <div class="mb-3 d-none" id="studentField">
          <label class="form-label">Student ID</label>
          <input type="text" class="form-control" id="studentId" placeholder="STU-2024-001">
          <div class="form-text">Your institution must register you first. Use the same email they recorded if provided.</div>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2" id="submitBtn">
          <i class="bi bi-person-plus"></i> Create Account
        </button>
      </form>
      <p class="text-center mt-3 mb-0">
        Already have an account? <a href="/login.html">Sign in</a>
      </p>
    </div>
  </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script>
    const roleSelect = document.getElementById('role');
    roleSelect.addEventListener('change', () => {
      document.getElementById('institutionField').classList.toggle('d-none', roleSelect.value !== 'institution');
      document.getElementById('studentField').classList.toggle('d-none', roleSelect.value !== 'student');
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const alert = document.getElementById('alert');
      btn.disabled = true;

      const role = roleSelect.value;
      const payload = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        role,
      };

      if (role === 'institution') payload.institutionName = document.getElementById('institutionName').value;
      if (role === 'student') payload.studentId = document.getElementById('studentId').value;

      try {
        const data = await api.register(payload);
        setAuth(data.token, data.user);
        showAlert(alert, data.message, 'success');
        setTimeout(() => redirectByRole(data.user), 1500);
      } catch (err) {
        showAlert(alert, err.message);
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
