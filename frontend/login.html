<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - CertiChain</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/css/style.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-dark navbar-app">
    <div class="container">
      <a class="navbar-brand" href="/"><i class="bi bi-shield-check"></i> Certi<span>Chain</span></a>
    </div>
  </nav>

  <div class="auth-page">
  <div class="container">
    <div class="card auth-card p-4">
      <div class="text-center mb-4">
        <h2>Welcome Back</h2>
        <p class="text-muted">Sign in to your account</p>
      </div>
      <div id="alert"></div>
      <form id="loginForm">
        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-control" id="email" required placeholder="you@example.com">
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" id="password" required placeholder="Enter password">
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2" id="submitBtn">
          <i class="bi bi-box-arrow-in-right"></i> Sign In
        </button>
      </form>
      <p class="text-center mt-3 mb-0">
        Don't have an account? <a href="/register.html">Register here</a>
      </p>
      <hr>
      <p class="text-center small text-muted mb-0">
        Demo Admin: admin@certverify.edu / admin123<br>
        Demo Auditor: auditor@certverify.edu / auditor123
      </p>
    </div>
  </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script>
    if (getToken()) redirectByRole(getUser());

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const alert = document.getElementById('alert');
      UI.setButtonLoading(btn, true, 'Signing in...');

      try {
        const data = await api.login(
          document.getElementById('email').value,
          document.getElementById('password').value
        );
        setAuth(data.token, data.user);
        redirectByRole(data.user);
      } catch (err) {
        showAlert(alert, err.message);
        UI.setButtonLoading(btn, false);
      }
    });
  </script>
</body>
</html>
